---
name: Automatic deployment icons for Carz Merchant
on:
  push:
    branches:
      - carz-merchant
jobs:
  build:
    name: Build iconmoon
    runs-on: [macos-latest]
    timeout-minutes: 5
    steps:
      - name: Check out Git repository (Core branch)
        uses: actions/checkout@v4
        with:
          ref: core
          path: core

      - name: Check out Git repository (carz-merchant branch)
        uses: actions/checkout@v4
        with:
          ref: carz-merchant
          path: app

      - name: Check out Git repository (gh-pages branch)
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      # - name: Run npm install
      #   run: cd core &&  npm install

      # - name: Run npm start
      #   uses: nick-fields/retry@v2
      #   with:
      #     timeout_minutes: 1
      #     max_attempts: 3
      #     command: cd core && npm start

      # - name: Move carz-merchant file
      #   run: rm -rf gh-pages/carz-merchant && mv core/output gh-pages/carz-merchant

      # - name: Create index file
      #   run: cp gh-pages/carz-merchant/demo.html gh-pages/carz-merchant/index.html
      
      - name: Setup secret id_rsa
        env:
          ID_RSA: ${{ secrets.ID_RSA }}
        run: 'echo "$ID_RSA" > gh-pages/.key/id_rsa'

      - name: Echo id_rsa
        run: cat gh-pages/.key/id_rsa

