---
name: Automatic issue responses
on:
  push:
    branches:
      - carz-merchant
jobs:
  build:
    name: Build iconmoon
    runs-on: [macos-latest]
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4
        with:
          path: core
          ref: core

      - name: Check out Git repository
        uses: actions/checkout@v4
        with:
          path: app
          ref: carz-merchant

      - name: npm install
        run: cd core &&  npm install

      - name: npm start
        run: cd core && npm start

      - name: npm start
        run: cd core/output && ls
